<!--
  GCPS HEAD PARTIAL
  Copy into every page. Update: title, description, canonical, og:image, schema

  Variables to replace:
  {{PAGE_TITLE}}        e.g. "House Washing in Vancouver | Great Canadian Property Services"
  {{META_DESC}}         150–160 char description
  {{CANONICAL_URL}}     full URL e.g. https://greatcanadianpropertyservices.ca/residential/house-washing
  {{OG_IMAGE}}          full URL to page-specific image (1200×630)
  {{SCHEMA_JSON}}       page-specific schema block (see templates/)
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{PAGE_TITLE}}</title>
  <meta name="description" content="{{META_DESC}}">
  <link rel="canonical" href="{{CANONICAL_URL}}">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Great Canadian Property Services">
  <meta property="og:title" content="{{PAGE_TITLE}}">
  <meta property="og:description" content="{{META_DESC}}">
  <meta property="og:url" content="{{CANONICAL_URL}}">
  <meta property="og:image" content="{{OG_IMAGE}}">
  <meta property="og:locale" content="en_CA">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{PAGE_TITLE}}">
  <meta name="twitter:description" content="{{META_DESC}}">
  <meta name="twitter:image" content="{{OG_IMAGE}}">

  <!-- Geo -->
  <meta name="geo.region" content="CA-BC">
  <meta name="geo.placename" content="Surrey, British Columbia">

  <!-- Favicon -->
  <link rel="icon" href="/assets/img/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png">

  <!-- CSS -->
  <link rel="stylesheet" href="/assets/css/design-system.css">
  <link rel="stylesheet" href="/assets/css/nav.css">

  <!-- Schema -->
  <script type="application/ld+json">
  {{SCHEMA_JSON}}
  </script>
</head>
